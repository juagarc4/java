<div class="container" data-th-fragment="content">
    <div class="text-center" style="margin:30px">
        <h3>Contacts List</h3>
    </div>
    <div class="container">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th scope="col">Id</th>
                    <th scope="col">First Name</th>
                    <th scope="col">Last Name</th>
                    <th scope="col">Phone</th>
                    <th scope="col">E-Mail</th>
                    <th scope="col">Actions</th>

                </tr>
                </thead>
                <tbody>
                <tr data-th-each="contact : ${contacts}">
                    <th scope="row" data-th-text="${contact.id}"></th>
                    <td data-th-text="${contact.firstName}"></td>
                    <td data-th-text="${contact.lastName}"></td>
                    <td data-th-text="${contact.phone}"></td>
                    <td data-th-text="${contact.email}"></td>
                    <td>
                        <div class="d-flex">

                            <a class="btn btn-primary me-2"
                               data-th-href="@{/contacts/edit(contact=${contact.id})}">Edit</a>
                            <form data-th-action="@{/contacts/delete}" method="post" style="display:inline;">
                                <input type="hidden" name="contact" data-th-value="${contact.id}">
                                <button type="submit" class="btn btn-danger"
                                        onclick="return confirm('Are you sure?');">Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
